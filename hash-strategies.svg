<svg width="100%" viewBox="0 0 1000 590" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>Visão geral das quatro estratégias de hash com sondagem</title>
<desc>Diagrama comparando LinearProbing, LocallyLinear, WalkFirst e CAAP (Cluster-Aware Adaptive Probing)</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="1000" height="590" rx="14" fill="#1f1e1c"/>

<!-- ===================== ROW 1: STRATEGY CARDS ===================== -->

<!-- LinearProbing -->
<rect x="20" y="20" width="215" height="56" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="127" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="rgb(211,209,199)">LinearProbing</text>
<text x="127" y="60" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(180,178,169)">Baseline clássico</text>

<text x="127" y="96" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">1 hash → sondagem linear</text>

<text x="64" y="112" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">h1(k)</text>
<line x1="64" y1="116" x2="64" y2="124" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="30" y="124" width="20" height="20" rx="3" fill="none" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<rect x="54" y="124" width="20" height="20" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="78" y="124" width="20" height="20" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="102" y="124" width="20" height="20" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="126" y="124" width="20" height="20" rx="3" fill="none" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<rect x="150" y="124" width="20" height="20" rx="3" fill="none" stroke="#E2A23D" stroke-width="1.3"/>
<text x="160" y="134" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#F2C879">K</text>
</g>

<text x="127" y="166" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">sonda até achar célula vazia</text>
<text x="127" y="181" text-anchor="middle" font-size="9" fill="#D67C7B">cluster cresce ao redor de h1(k)</text>

<!-- LocallyLinear -->
<rect x="262" y="20" width="215" height="56" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="369" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="rgb(159,225,203)">LocallyLinear</text>
<text x="369" y="60" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(93,202,165)">Dalal et al., 2023</text>

<text x="369" y="96" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">dois blocos candidatos</text>

<text x="318" y="112" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">h1(k)</text>
<line x1="318" y1="116" x2="318" y2="124" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="420" y="112" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">h2(k)</text>
<line x1="420" y1="116" x2="420" y2="124" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="272" y="124" width="92" height="22" rx="3" fill="none" stroke="#0F6E56" stroke-width="1"/>
<text x="318" y="131" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">bloco B1</text>
<text x="318" y="142" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">carga 2</text>

<rect x="374" y="124" width="92" height="22" rx="3" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="420" y="131" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(159,225,203)">bloco B2</text>
<text x="420" y="142" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(159,225,203)">carga 1 ✓</text>

<text x="369" y="166" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">sonda local dentro do bloco</text>
<text x="369" y="181" text-anchor="middle" font-size="9" fill="rgb(159,225,203)">menos carregado (B2)</text>

<!-- WalkFirst -->
<rect x="504" y="20" width="215" height="56" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="611" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="rgb(206,203,246)">WalkFirst</text>
<text x="611" y="60" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(175,169,236)">Dalal et al., 2023</text>

<text x="611" y="96" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">sondagem completa da tabela</text>

<text x="555" y="112" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">h1 → u</text>
<text x="667" y="112" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">h2 → v</text>

<rect x="529" y="124" width="16" height="20" rx="2" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="547" y="124" width="16" height="20" rx="2" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="565" y="124" width="16" height="20" rx="2" fill="none" stroke="#534AB7" stroke-width="1.5"/>
<text x="573" y="134" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">u</text>

<rect x="627" y="124" width="16" height="20" rx="2" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<rect x="645" y="124" width="16" height="20" rx="2" fill="none" stroke="#534AB7" stroke-width="1.5"/>
<text x="653" y="134" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">v</text>

<text x="611" y="166" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">insere no bloco(u) ou bloco(v)</text>
<text x="611" y="181" text-anchor="middle" font-size="9" fill="rgb(206,203,246)">de menor carga</text>

<!-- CAAP -->
<rect x="746" y="20" width="234" height="56" rx="8" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
<text x="863" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="rgb(250,199,117)">CAAP</text>
<text x="863" y="60" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(239,159,39)">Cluster-Aware Adaptive Probing</text>

<text x="863" y="96" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">mede γ(k) e ϕ(k) a partir de h1(k)</text>

<polygon points="863,112 905,134 863,156 821,134" fill="none" stroke="#854F0B" stroke-width="1.2"/>
<text x="863" y="128" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">γ(k) &lt; τ</text>
<text x="863" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="rgb(194,192,182)">e ϕ(k) &lt; φ ?</text>

<line x1="838" y1="148" x2="813" y2="164" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<text x="803" y="171" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">sim</text>
<text x="803" y="184" text-anchor="middle" font-size="9" fill="rgb(250,199,117)">LinearProbing</text>

<line x1="888" y1="148" x2="913" y2="164" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<text x="923" y="171" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">não</text>
<text x="923" y="184" text-anchor="middle" font-size="9" fill="rgb(250,199,117)">WalkFirst</text>

<!-- separator -->
<line x1="20" y1="205" x2="980" y2="205" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<!-- ===================== BLOCK SIZE FORMULA ===================== -->
<text x="500" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(250,249,245)">tamanho de bloco: β = ⌈ log₂(log₂ n) / (1 − α) ⌉</text>
<text x="500" y="248" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">n = 65 536 (2¹⁶), α = 0.90 → log₂(16) = 4, log₂(4) = 2 → β = ⌈2 / 0.1⌉ = 20 células por bloco</text>
<text x="500" y="265" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">α = 0.50 → β = ⌈2 / 0.5⌉ = 4 células por bloco</text>

<!-- ===================== WORST CASE COMPLEXITY ===================== -->
<text x="500" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(250,249,245)">maior cluster — complexidade de pior caso</text>

<rect x="20" y="312" width="215" height="40" rx="6" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="127" y="327" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="rgb(211,209,199)">LinearProbing</text>
<text x="127" y="343" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(180,178,169)">Ω(log n)</text>

<rect x="262" y="312" width="215" height="40" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="369" y="327" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="rgb(159,225,203)">LocallyLinear</text>
<text x="369" y="343" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(93,202,165)">O(log log n) ✓</text>

<rect x="504" y="312" width="215" height="40" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="611" y="327" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="rgb(206,203,246)">WalkFirst</text>
<text x="611" y="343" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(175,169,236)">O(log log n) ✓ (α &lt; 1/2)</text>

<rect x="746" y="312" width="234" height="40" rx="6" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
<text x="863" y="327" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="rgb(250,199,117)">CAAP</text>
<text x="863" y="343" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(239,159,39)">O(log log n), empírico</text>

<!-- ===================== KEY INSIGHT ===================== -->
<rect x="30" y="368" width="940" height="58" rx="8" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="4 2"/>
<text x="500" y="389" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">Resultado empírico do artigo: o CAAP ativa o modo WalkFirst apenas quando γ(k) ≥ τ ou ϕ(k) ≥ φ,</text>
<text x="500" y="407" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">reduzindo o maior cluster em até 93,7% frente ao LinearProbing (α = 0.97), com custo adaptativo.</text>

<!-- ===================== AUX MEMORY ===================== -->
<text x="500" y="454" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(250,249,245)">memória auxiliar (contadores por bloco)</text>

<text x="127" y="476" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">0 bytes extras</text>
<text x="369" y="476" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">⌈n/β⌉ · 8 bytes</text>
<text x="611" y="476" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">⌈n/β⌉ · 8 bytes</text>
<text x="863" y="476" text-anchor="middle" font-size="11" fill="rgb(194,192,182)">⌈n/β⌉ · 8 bytes</text>

<rect x="20" y="486" width="215" height="14" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
<rect x="262" y="486" width="215" height="14" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.3" opacity="0.6"/>
<rect x="504" y="486" width="215" height="14" rx="3" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.3" opacity="0.6"/>
<rect x="746" y="486" width="234" height="14" rx="3" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.3" opacity="0.6"/>

<text x="127" y="516" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">sem overhead</text>
<text x="369" y="516" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">o(n) extra</text>
<text x="611" y="516" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">o(n) extra</text>
<text x="863" y="516" text-anchor="middle" font-size="9" fill="rgb(194,192,182)">o(n) extra (idêntico às demais)</text>

<text x="500" y="556" text-anchor="middle" font-size="11" fill="rgb(156,154,146)">para n = 65 536 e α = 0.90, a memória auxiliar do CAAP equivale a ≈ 20 KB (0,4% do espaço da tabela)</text>

</svg>
